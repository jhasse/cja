name: Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: fedora:43
    env:
      UV_LINK_MODE: copy
      FORCE_COLOR: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      run: sudo dnf install -y uv python ninja gcc-c++ zlib-devel gtest-devel libwebp-devel libvorbis-devel ruff nodejs

    - name: Lint code
      run: |
        uv run ruff check
        uv pip install pyright
        uv run pyright

    - name: Run tests
      run: uv run pytest
